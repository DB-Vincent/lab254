replicaCount: 1
image:
  registry: ghcr.io
  repository: dani-garcia/vaultwarden
  tag: 1.37.0-alpine
service:
  type: ClusterIP
  port: 80
resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi
storage:
  data:
    name: "vaultwarden-data"
    size: "2Gi"
    class: "longhorn"
    path: "/data"
    keepPvc: true
    accessMode: "ReadWriteOnce"
domain: https://bitwarden.vincentdeborger.be
ingress:
  enabled: true
  class: cilium
  # Chart defaults add nginx-only redirect annotations; incompatible with Cilium.
  nginxIngressAnnotations: false
  additionalAnnotations:
    kubernetes.io/ingress.class: cilium
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    ingress.cilium.io/loadbalancer-mode: shared
    # Allow HTTP-01 challenges while TLS is configured on this Ingress.
    ingress.cilium.io/force-https: disabled
    acme.cert-manager.io/http01-edit-in-place: "true"
  tls: true
  tlsSecret: "bitwarden-vincentdeborger-be-tls"
  hostname: "bitwarden.vincentdeborger.be"
