apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: vaultwarden
      version: "v0.36.x"
      sourceRef:
        kind: HelmRepository
        name: vaultwarden
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: vaultwarden-helm-values
      valuesKey: values.yaml
