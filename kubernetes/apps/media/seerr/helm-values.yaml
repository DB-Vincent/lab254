controllers:
  main:
    replicas: 1
    containers:
      main:
        image:
          repository: ghcr.io/seerr-team/seerr
          tag: v3.1.0
          pullPolicy: IfNotPresent
        env:
          TZ: UTC
          PORT: 5055

defaultPodOptions:
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 5055

ingress:
  main:
    className: cilium
    annotations:
      ingress.cilium.io/loadbalancer-mode: shared
    hosts:
      - host: seerr.k8s.lab.lan
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http

persistence:
  config:
    enabled: true
    storageClass: longhorn
    size: 2Gi
    accessMode: ReadWriteOnce
    advancedMounts:
      main:
        main:
          - path: /app/config
